<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASCII Webcam</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #00ff41;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 16px;
  }

  h1 {
    font-size: 13px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #00ff41;
    margin-bottom: 14px;
    opacity: 0.7;
    text-align: center;
  }

  #controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px 16px;
    align-items: center;
    justify-content: center;
    margin-bottom: 14px;
    width: 100%;
    max-width: 900px;
  }

  #btn-group { display: flex; gap: 8px; }

  button {
    background: transparent;
    border: 1px solid #00ff41;
    color: #00ff41;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    padding: 8px 18px;
    cursor: pointer;
    transition: background 0.15s;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  button:hover, button:active { background: rgba(0,255,65,0.12); }

  label {
    font-size: 11px;
    letter-spacing: 0.1em;
    opacity: 0.6;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  input[type=range] {
    accent-color: #00ff41;
    width: 100px;
    height: 20px;
    cursor: pointer;
  }

  input[type=checkbox] {
    width: 16px;
    height: 16px;
    cursor: pointer;
    accent-color: #00ff41;
  }

  #view {
    display: flex;
    flex-direction: row;
    gap: 12px;
    width: 100%;
    align-items: flex-start;
    justify-content: center;
  }

  #ascii-output {
    font-family: 'Courier New', monospace;
    font-size: 6px;
    line-height: 1.1;
    white-space: pre;
    letter-spacing: 0.05em;
    color: #00ff41;
    background: #0a0a0a;
    border: 1px solid rgba(0,255,65,0.15);
    padding: 8px;
    overflow: hidden;
    min-height: 100px;
    text-align: center;
  }

  #video {
    border: 1px solid rgba(0,255,65,0.15);
    object-fit: fill;
    display: none;
  }

  #video.visible { display: block; }

  #status {
    margin-top: 10px;
    font-size: 10px;
    letter-spacing: 0.15em;
    opacity: 0.45;
    text-transform: uppercase;
  }

  canvas { display: none; }

  @media (max-width: 600px) {
    #view { flex-direction: column-reverse; }
    h1 { font-size: 11px; letter-spacing: 0.2em; }
    input[type=range] { width: 80px; }
    button { padding: 8px 14px; font-size: 10px; }
    label { font-size: 10px; }
  }
</style>
</head>
<body>

<h1>[ ASCII WEBCAM ]</h1>

<div id="controls">
  <div id="btn-group">
    <button id="startBtn" onclick="startCam()">START CAMERA</button>
    <button id="stopBtn" onclick="stopCam()" style="display:none">STOP</button>
  </div>
  <label>DENSITY
    <input type="range" id="densitySlider" min="40" max="160" value="80">
  </label>
  <label>CONTRAST
    <input type="range" id="contrastSlider" min="50" max="300" value="100">
  </label>
  <label>INVERT
    <input type="checkbox" id="invertCheck">
  </label>
  <label>CAM VIEW
    <input type="checkbox" id="camViewCheck" onchange="toggleCamView()">
  </label>
</div>

<div id="view">
  <div id="ascii-output">Press START CAMERA to begin.</div>
  <video id="video" autoplay playsinline></video>
</div>
<div id="status">ready</div>

<canvas id="canvas"></canvas>

<script src="ascii-webcam.js"></script>
</body>
</html>
